<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" fill="#b8bfae" rx="6"/>
  <!-- Dark border -->
  <rect width="100" height="100" fill="none" stroke="#2c2c2c" stroke-width="5" rx="6"/>
  <!-- Divider lines -->
  <line x1="50" y1="0" x2="50" y2="100" stroke="#2c2c2c" stroke-width="3"/>
  <line x1="0" y1="50" x2="100" y2="50" stroke="#2c2c2c" stroke-width="3"/>
  <!-- L - top left -->
  <text x="25" y="40" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#2c2c2c" text-anchor="middle" dominant-baseline="middle">L</text>
  <!-- M - bottom right -->
  <text x="75" y="76" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#2c2c2c" text-anchor="middle" dominant-baseline="middle">M</text>
</svg>
